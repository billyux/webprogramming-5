<!DOCTYPE html>
<html>
<head>
   
    <title>과제</title>
    <style>
        
        h1 {
            font-size: 20px;
            text-align: center;
        }

        .bold {
            font-weight: bold;
        }

      
        input[type="text"] {
            background-color: rgb(242, 140, 212);
        }

        input[type="password"] {
            background-color: rgb(0, 191, 255);
        }

        
        .button{
            width: 120px;
            height: 50px;
            background-color: orange;
            color: white;
            text-align: center;
            line-height: 50px;
            border-radius: 20px;
        }
    </style>
</head>

<body>

    
    <h1>나는 누구인가</h1>
    <p>저는 구본국 입니다.</p>
    <p class="bold">컴퓨터 공학과 2학년입니다.</p>

    <input type="text" a="아이디"><br><br>
    <input type="password" b="비밀번호">
    
    <div class="button">Click</div>

</body>
</html>
